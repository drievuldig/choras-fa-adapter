name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest --cov=src/choras_fa_adapter --cov-fail-under=70
      - name: Build
        run: |
          pip install build twine
          python -m build
          twine check dist/*

  install-smoke:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build Artifacts
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build
      - name: Clean Artifact Install Smoke
        run: |
          python -m venv .ci-smoke-venv
          . .ci-smoke-venv/bin/activate
          python -m pip install --upgrade pip
          pip install dist/*.whl
          python -c "import choras_fa_adapter; print(choras_fa_adapter.__version__)"
          choras-fa-adapter --help
